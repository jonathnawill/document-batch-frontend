<div class="modal-backdrop fade show" (click)="fechar()"></div>

<div class="modal d-block">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Atualizar Status</h5>
        <button type="button" class="btn-close" (click)="fechar()" aria-label="Fechar"></button>
      </div>

      <div class="modal-body">
        <p class="text-muted small mb-3">
          Lote <strong>#{{ lote?.id }}</strong> — {{ lote?.operador }}
        </p>
        <label class="form-label" for="status-select">Novo status</label>
        <select id="status-select" class="form-select" [formControl]="statusControl">
          @for (opcao of opcoes; track opcao.value) {
            <option [value]="opcao.value">{{ opcao.label }}</option>
          }
        </select>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="fechar()">Cancelar</button>
        <button class="btn btn-primary" (click)="confirmar()">Salvar</button>
      </div>

    </div>
  </div>
</div>
